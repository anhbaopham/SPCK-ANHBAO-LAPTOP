<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in</title>
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css"
      rel="stylesheet"
      type="text/css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/tailwindcss@3.3.2/dist/tailwind.min.css"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="fontawesome/css/all.min.css" />
    <link rel="stylesheet" href="./css/style.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="https://shorturl.at/d0HPX"
    />
  </head>
  <body>
    <div class="navbar bg-base-100 shadow-md bg-white" id="header">
      <!--  -->

      <!--  -->
      <div class="flex-1">
        <a
          href="index.html"
          class="btn btn-ghost text-xl absolute top-3.5 font-extralight h-11"
          ><svg
            xmlns="http://www.w3.org/2000/svg"
            viewBox="0 0 64 64"
            width="70"
            height="70"
            aria-label="Shopme"
            class="relative inline-block mr-2 top-1"
          >
            <!-- Laptop screen -->
            <rect x="12" y="14" width="40" height="24" rx="3" fill="#6D28D9" />
            <!-- Base -->
            <rect x="8" y="38" width="48" height="4" rx="1" fill="#FBBF24" />
            <!-- Checkmark -->
            <path
              d="M24 26l6 6 12-12"
              stroke="#fff"
              stroke-width="4"
              fill="none"
              stroke-linecap="round"
            />
          </svg>

          <link
            rel="icon"
            type="image/png"
            sizes="32x32"
            href="/assets/favicon-32.png"
          />Shopme
        </a>
      </div>
    </div>
    <section class="relative min-h-screen">
      <div class="absolute inset-0 -z-10">
        <img
          src="https://i.pinimg.com/736x/93/e4/48/93e448d08277d1d2cac0ff91888ffdda.jpg"
          class="w-full h-full object-cover"
          alt=""
        />
      </div>
      <div class="absolute inset-0 bg-black/40 -z-10"></div>

      <div class="px-0 py-20 mx-auto max-w-7xl sm:px-4">
        <div
          id="check-user"
          class="hidden w-full px-4 pt-5 pb-6 mx-auto mt-8 mb-6 bg-white rounded-none shadow-xl sm:rounded-lg sm:w-10/12 md:w-8/12 lg:w-6/12 xl:w-4/12 sm:px-6"
        >
          <h1 class="mb-4 text-lg font-semibold text-center text-gray-900">
            You are already logged in! Do you want...?
          </h1>
          <div class="flex justify-center gap-4">
            <a
              href="./index.html"
              id="btn-logout"
              class="btn btn-error flex self-center"
              >Log out</a
            >
            <a href="./index.html" class="btn btn-success flex self-center"
              >Go back</a
            >
            <a href="./signup.html" class="btn btn-info flex self-center"
              >Create an account</a
            >
          </div>
        </div>
        <form
          id="login-form"
          class="hidden w-full px-4 pt-5 pb-6 mx-auto mt-8 mb-6 bg-white rounded-none shadow-xl sm:rounded-lg sm:w-10/12 md:w-8/12 lg:w-6/12 xl:w-4/12 sm:px-6"
        >
          <h1 class="mb-4 text-lg font-semibold text-left text-gray-900">
            Log in to your account
          </h1>
          <div class="mb-8 space-y-4">
            <label class="block">
              <span class="block mb-1 text-xs font-medium text-gray-700"
                >Your Email</span
              >
              <input
                class="input input-bordered w-full rounded-lg"
                id="email"
                type="email"
                placeholder="Ex. abcd@gmail.com"
                inputmode="email"
                required
              />
            </label>
            <label class="block">
              <span class="block mb-1 text-xs font-medium text-gray-700"
                >Your Password</span
              >
              <input
                class="input input-bordered w-full rounded-lg"
                id="password"
                type="password"
                placeholder="••••••••"
                required
              />
            </label>
            <input
              id="submit"
              type="submit"
              class="w-full py-3 mt-1 btn btn-primary"
              value="Login"
            />
          </div>
          <div class="space-y-8">
            <div
              class="text-center border-b border-gray-200"
              style="line-height: 0px"
            >
              <span
                class="p-2 text-xs font-semibold tracking-wide text-gray-600 uppercase bg-white"
                style="line-height: 0px"
                >Or</span
              >
            </div>
            <div class="grid gap-4 pb-5">
              <a
                id="googleLogin"
                type="google"
                class="py-3 btn btn-icon btn-google"
              >
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="currentColor"
                  class="mr-1"
                >
                  <path
                    d="M20.283,10.356h-8.327v3.451h4.792c-0.446,2.193-2.313,3.453-4.792,3.453c-2.923,0-5.279-2.356-5.279-5.28	c0-2.923,2.356-5.279,5.279-5.279c1.259,0,2.397,0.447,3.29,1.178l2.6-2.599c-1.584-1.381-3.615-2.233-5.89-2.233	c-4.954,0-8.934,3.979-8.934,8.934c0,4.955,3.979,8.934,8.934,8.934c4.467,0,8.529-3.249,8.529-8.934	C20.485,11.453,20.404,10.884,20.283,10.356z"
                  />
                </svg>
              </a>
            </div>
          </div>
        </form>
        <p class="mb-10 text-center text-sm font-medium text-gray-400">
          <a
            href="./signup.html"
            class="text-purple-200 underline hover:text-white"
            >Create an account</a
          >
          ·
          <a href="#" class="text-purple-200 underline hover:text-white"
            >Forgot password</a
          >
          ·
          <a href="#" class="text-purple-200 underline hover:text-white"
            >Privacy & Terms</a
          >
        </p>
      </div>
    </section>
    <!-- link CDN của firebase -->
    <!-- chữ defer có nghĩa là phải tải xong script ở trên thì mới tiếp tục xuống dưới tuần tự -->
    <script
      defer
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"
    ></script>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"
    ></script>
    <script
      defer
      src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"
    ></script>

    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Cấu hình nhận diện chủ sở hữu config -->
    <script defer src="../firebase.config.js"></script>

    <script defer src="../js/main.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script defer src="../js/auth.js"></script>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"
    ></script>
  </body>
</html>
